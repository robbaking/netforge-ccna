<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetForge — Dashboard Concepts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'JetBrains Mono', monospace; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="variant-terminal.jsx"></script>
  <script type="text/babel" src="variant-amber.jsx"></script>
  <script type="text/babel" src="variant-cyber.jsx"></script>
  <script type="text/babel">
    const { DesignCanvas, DCSection, DCArtboard } = window;
    const { TerminalDashboard, AmberDashboard, CyberDashboard } = window;

    const App = () => (
      <DesignCanvas>
        <DCSection
          id="dashboards"
          title="NetForge — Dashboard"
          subtitle="Tre visuella riktningar. Klicka på en för att zooma in, dra för att ändra ordning."
        >
          <DCArtboard id="terminal" label="A · Terminal Green" width={1440} height={900}>
            <TerminalDashboard />
          </DCArtboard>
          <DCArtboard id="amber" label="B · Amber Console" width={1440} height={900}>
            <AmberDashboard />
          </DCArtboard>
          <DCArtboard id="cyber" label="C · Cyber Blue" width={1440} height={900}>
            <CyberDashboard />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
