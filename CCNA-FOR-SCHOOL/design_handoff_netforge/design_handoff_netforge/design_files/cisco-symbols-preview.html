<!DOCTYPE html>
<html><head>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080f1a;padding:40px;font-family:'JetBrains Mono',monospace;color:#cdd9e5}
h1{font-size:18px;margin-bottom:24px;color:#06d6a0;text-transform:uppercase;letter-spacing:2px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px}
.cell{background:#0d1525;border:1px solid #1a2640;border-radius:10px;padding:20px;display:flex;flex-direction:column;align-items:center;gap:8px}
.name{font-size:11px;color:#cdd9e5;font-weight:600;margin-top:8px}
.desc{font-size:9px;color:#7a8ba3;text-align:center;line-height:1.5}
</style>
</head><body>
<h1>◆ NetForge — Cisco Device Symbols</h1>
<div class="grid" id="grid"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="cisco-icons.jsx"></script>
<script type="text/babel">
const { CiscoRouter, CiscoSwitchL2, CiscoSwitchL3, CiscoPC, CiscoServer, CiscoFirewall, CiscoCloud, CiscoAP } = window.CiscoIcons;
const items = [
  { El: CiscoRouter, name: 'Router', desc: 'Cylinder med 4 arrows (2 in, 2 ut)' },
  { El: CiscoSwitchL3, name: 'L3 Switch', desc: 'Box med routing + switching arrows + "L3"-badge' },
  { El: CiscoSwitchL2, name: 'L2 Switch', desc: 'Box med 4 parallella arrows' },
  { El: CiscoFirewall, name: 'Firewall', desc: 'Brick-wall pattern' },
  { El: CiscoServer, name: 'Server', desc: 'Tall rack med slot-rader + LED' },
  { El: CiscoPC, name: 'PC / Host', desc: 'Monitor + stand' },
  { El: CiscoCloud, name: 'Cloud (Internet)', desc: 'Klassisk moln-symbol' },
  { El: CiscoAP, name: 'Access Point', desc: 'Dome med signal-vågor' },
];
const Card = ({ El, name, desc }) => (
  <div className="cell">
    <svg width="96" height="96" viewBox="0 0 96 96"><El size={96} /></svg>
    <div className="name">{name}</div>
    <div className="desc">{desc}</div>
  </div>
);
ReactDOM.createRoot(document.getElementById('grid')).render(
  <>{items.map(it => <Card key={it.name} {...it} />)}</>
);
</script>
</body></html>
